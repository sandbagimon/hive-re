<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SimLab</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  </head>
  <body>
    <div id="app-shell">
      <header id="command-bar">
        <div class="brand-block">
          <strong>SimLab</strong>
          <span id="project-label">Untitled Scene</span>
        </div>
        <nav class="command-group" aria-label="Project commands">
          <button type="button" data-command="new">New</button>
          <button type="button" data-command="open">Open</button>
          <button type="button" data-command="save">Save</button>
          <button type="button" data-command="save-as">Save As</button>
          <button type="button" data-command="import-openusd">Import USD</button>
        </nav>
        <nav class="command-group" aria-label="Edit commands">
          <button type="button" data-command="undo" id="undo-button" title="Undo">↶</button>
          <button type="button" data-command="redo" id="redo-button" title="Redo">↷</button>
        </nav>
        <nav class="command-group simulation-commands" aria-label="Simulation commands">
          <button type="button" data-command="export">Export</button>
          <button type="button" data-command="run" class="primary">Run</button>
          <button type="button" data-command="pause">Pause</button>
          <button type="button" data-command="step">Step</button>
          <button type="button" data-command="reset">Reset</button>
        </nav>
        <div id="simulation-badge" data-status="stopped">Stopped</div>
      </header>

      <main id="workspace">
        <aside id="left-sidebar">
          <section class="panel-section asset-section">
            <header><h2>Assets</h2></header>
            <div id="asset-list" class="asset-list"></div>
          </section>
          <section class="panel-section scene-section">
            <header><h2>Scene</h2><span id="actor-count">0</span></header>
            <div id="scene-tree" class="scene-tree"></div>
          </section>
        </aside>

        <section id="viewport-panel">
          <canvas id="viewport"></canvas>
          <div id="hud">
            <div id="scene-name">Untitled Scene</div>
            <div id="scene-stats">0 actors</div>
            <div id="selection">Selected: None</div>
          </div>
          <div id="viewport-toolbar" aria-label="Viewport tools">
            <button class="tool-button active" type="button" data-tool="translate" title="Translate">↔</button>
            <button class="tool-button" type="button" data-tool="rotate" title="Rotate">↻</button>
            <button class="tool-button" type="button" data-tool="scale" title="Scale">⤢</button>
            <span class="toolbar-divider"></span>
            <button class="tool-button" type="button" data-action="collider-debug" aria-pressed="false" title="Collider debug">◇</button>
            <button class="tool-button" type="button" data-action="frame" title="Frame selected">⌗</button>
            <button class="tool-button" type="button" data-camera="iso" title="Isometric view">◆</button>
            <button class="tool-button" type="button" data-camera="front" title="Front view">▤</button>
            <button class="tool-button" type="button" data-camera="right" title="Right view">◧</button>
            <button class="tool-button" type="button" data-camera="top" title="Top view">▣</button>
          </div>
          <div id="collider-legend" hidden>
            <span><i class="legend-swatch dynamic"></i>Dynamic</span>
            <span><i class="legend-swatch static"></i>Static</span>
            <span><i class="legend-swatch center"></i>Center of mass</span>
          </div>
        </section>

        <aside id="inspector-panel">
          <header><h2>Properties</h2></header>
          <div id="property-inspector"></div>
          <section id="validation-panel" hidden>
            <header><h2>Validation</h2><span id="validation-count">0</span></header>
            <div id="validation-list"></div>
          </section>
        </aside>
      </main>

      <section id="console-panel">
        <header><h2>Console</h2><button type="button" data-command="clear-console">Clear</button></header>
        <div id="console-output"></div>
      </section>
    </div>
    <div id="toast" role="status" hidden></div>
    <script type="module" src="./generated/app.js"></script>
  </body>
</html>
